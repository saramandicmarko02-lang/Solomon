name: Build Solomon Installer

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/Solomon.AdminUI.Web/package-lock.json

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build package
        shell: pwsh
        run: ./installer/build-package.ps1

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: SolomonAgent-win-x64
          path: dist/SolomonAgent-*.zip

      - name: Upload Inno Setup EXE if built
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: SolomonAgent-Setup-exe
          path: dist/SolomonAgent-Setup.exe
